# Release Progress Tracker — Reusable Workflow
#
# Collects release progress data from CAMARA repositories, generates an
# HTML viewer, deploys it to the caller's GitHub Pages, and opens a PR
# with updated data in the caller repository.
#
# Called by: release-progress-tracker.yml in ReleaseManagement
#
# Jobs:
#   1. collect-and-generate — runs collector + viewer generator
#   2. deploy-viewer        — deploys viewer HTML to caller's GitHub Pages
#   3. create-data-pr       — opens PR with updated releases-progress.yaml
#
# Jobs 2 and 3 run in parallel after job 1 completes.

name: Release Progress Tracker

on:
  workflow_call:
    inputs:
      debug:
        description: "Enable debug logging"
        type: boolean
        required: false
        default: false

env:
  # Source repository and ref for progress tracker code and shared assets.
  # Change these when testing on a fork or switching between branches.
  SOURCE_REPO: camaraproject/project-administration
  SOURCE_REF: main
  PROGRESS_UPDATE_BRANCH: release-progress-update
  PROGRESS_UPDATE_TITLE: 'Release Progress: Update releases-progress.yaml'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Collect progress data and generate viewer
  # ---------------------------------------------------------------------------
  collect-and-generate:
    name: Collect & Generate
    runs-on: ubuntu-latest
    outputs:
      has_data: ${{ steps.collect.outcome == 'success' }}
      data_changed: ${{ steps.collect.outputs.data_changed }}
    steps:
      - name: Generate App token
        id: app-token
        if: vars.RELEASE_APP_CLIENT_ID != ''
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          path: project-admin
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Checkout caller repository (for existing data)
        uses: actions/checkout@v6
        with:
          path: caller-repo
          sparse-checkout: data/
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyYAML requests

      - name: Collect release progress
        id: collect
        working-directory: project-admin/workflows/release-progress-tracker
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          EXISTING_ARG=""
          if [ -f "${{ github.workspace }}/caller-repo/data/releases-progress.yaml" ]; then
            EXISTING_ARG="--existing ${{ github.workspace }}/caller-repo/data/releases-progress.yaml"
          fi

          python3 -m scripts.collect_progress \
            --master ../../data/releases-master.yaml \
            --output ${{ runner.temp }}/releases-progress.yaml \
            $EXISTING_ARG \
            ${{ inputs.debug && '--debug' || '' }}

          echo "Collected data:"
          wc -l ${{ runner.temp }}/releases-progress.yaml

      - name: Generate viewer
        working-directory: project-admin/workflows/release-progress-tracker
        run: |
          python3 -m scripts.generate_progress_viewer \
            --data ${{ runner.temp }}/releases-progress.yaml \
            --output ${{ runner.temp }}/progress.html \
            --shared-assets ../release-collector/templates \
            ${{ inputs.debug && '--debug' || '' }}

          echo "Generated viewer:"
          wc -c ${{ runner.temp }}/progress.html

      - name: Upload data artifact
        uses: actions/upload-artifact@v7
        with:
          name: progress-data
          path: ${{ runner.temp }}/releases-progress.yaml
          retention-days: 7

      - name: Upload viewer artifact
        uses: actions/upload-artifact@v7
        with:
          name: progress-viewer
          path: ${{ runner.temp }}/progress.html
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Deploy viewer to caller's GitHub Pages
  # ---------------------------------------------------------------------------
  deploy-viewer:
    name: Deploy Viewer
    needs: collect-and-generate
    if: needs.collect-and-generate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download viewer artifact
        uses: actions/download-artifact@v8
        with:
          name: progress-viewer
          path: site

      - name: Add index redirect
        run: |
          cat > site/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0; url=progress.html">
          <title>Release Progress</title>
          </head><body>
          <p>Redirecting to <a href="progress.html">Release Progress Viewer</a>...</p>
          </body></html>
          HEREDOC
          touch site/.nojekyll

          echo "Site contents:"
          ls -la site/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ---------------------------------------------------------------------------
  # Job 3: Create PR with updated data in caller repository
  # ---------------------------------------------------------------------------
  create-data-pr:
    name: Create Data PR
    needs: collect-and-generate
    if: needs.collect-and-generate.outputs.data_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        if: vars.RELEASE_APP_CLIENT_ID != ''
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout caller repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          fetch-depth: 0

      - name: Download data artifact
        uses: actions/download-artifact@v8
        with:
          name: progress-data
          path: data

      - name: Generate change summary
        id: diff
        run: |
          git add data/
          echo "change_summary<<EOF" >> $GITHUB_OUTPUT
          git diff --cached --stat data/ >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changes detected:"
          git diff --cached --stat data/

      - name: Render pull request body
        id: pr-body
        run: |
          cat > "$RUNNER_TEMP/release-progress-pr-body.md" <<'EOF'
            ## Release Progress Data Update

            **Workflow run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Updates `data/releases-progress.yaml` with the latest release progress data
            collected from CAMARA repositories.

            The viewer has been deployed to [GitHub Pages](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/).

            ### Changes

            ```
            ${{ steps.diff.outputs.change_summary }}
            ```
          EOF
          echo "path=$RUNNER_TEMP/release-progress-pr-body.md" >> $GITHUB_OUTPUT

      - name: Prepare stable update branch
        id: stable-pr
        env:
          BRANCH: ${{ env.PROGRESS_UPDATE_BRANCH }}
          COMMIT_MESSAGE: ${{ env.PROGRESS_UPDATE_TITLE }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          TITLE: ${{ env.PROGRESS_UPDATE_TITLE }}
        run: |
          set -euo pipefail

          git config user.name "camara-release-automation[bot]"
          git config user.email "261643975+camara-release-automation[bot]@users.noreply.github.com"
          git fetch origin main

          PR_DATA=$(gh pr list --head "${{ github.repository_owner }}:$BRANCH" \
            --state open \
            --json number,url,title,headRefName \
            --jq '.[0] // {}' \
            --repo "${{ github.repository }}" 2>/dev/null || echo "{}")
          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number // empty')
          PR_URL=$(echo "$PR_DATA" | jq -r '.url // empty')
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title // empty')

          if git ls-remote --exit-code --heads origin "$BRANCH" > "$RUNNER_TEMP/progress-branch-ref"; then
            REMOTE_EXISTS=true
            REMOTE_SHA=$(cut -f1 "$RUNNER_TEMP/progress-branch-ref")
            git fetch origin "$BRANCH"
          else
            REMOTE_EXISTS=false
            REMOTE_SHA=""
          fi

          if [ "$REMOTE_EXISTS" = "true" ]; then
            if [ -z "$PR_NUMBER" ] || [ "$PR_TITLE" != "$TITLE" ]; then
              echo "::error::Existing $BRANCH branch has no matching open PR with title '$TITLE'. Refusing to overwrite it."
              exit 1
            fi

            NON_AUTOMATION_COMMITS=$(
              git log --format=%s "origin/main..origin/$BRANCH" \
                | grep -Fvx "$COMMIT_MESSAGE" || true
            )
            if [ -n "$NON_AUTOMATION_COMMITS" ]; then
              echo "::error::Existing $BRANCH branch contains non-automation commits. Refusing to overwrite it."
              echo "$NON_AUTOMATION_COMMITS"
              exit 1
            fi

            if git diff --quiet "origin/$BRANCH" -- data/; then
              echo "No changes detected compared to existing $BRANCH branch"
              echo "pr_action=unchanged_existing_pr" >> $GITHUB_OUTPUT
              echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
              echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          git checkout -B "$BRANCH" origin/main
          git add data/
          if git diff --cached --quiet -- data/; then
            echo "No changes detected compared to main"
            echo "pr_action=noop" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "pr_url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "$COMMIT_MESSAGE"
          if [ "$REMOTE_EXISTS" = "true" ]; then
            git push --force-with-lease=refs/heads/$BRANCH:$REMOTE_SHA origin HEAD:refs/heads/$BRANCH
            echo "pr_action=updated_existing_pr" >> $GITHUB_OUTPUT
          else
            git push origin HEAD:refs/heads/$BRANCH
            echo "pr_action=created_branch" >> $GITHUB_OUTPUT
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Create or update pull request
        id: create-pr
        if: steps.stable-pr.outputs.pr_action == 'created_branch' || steps.stable-pr.outputs.pr_action == 'updated_existing_pr'
        env:
          BRANCH: ${{ env.PROGRESS_UPDATE_BRANCH }}
          BODY_FILE: ${{ steps.pr-body.outputs.path }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          TITLE: ${{ env.PROGRESS_UPDATE_TITLE }}
        run: |
          set -euo pipefail

          if [ -n "${{ steps.stable-pr.outputs.pr_number }}" ]; then
            PR_NUMBER="${{ steps.stable-pr.outputs.pr_number }}"
            gh pr edit "$PR_NUMBER" \
              --title "$TITLE" \
              --body-file "$BODY_FILE" \
              --repo "${{ github.repository }}"
            PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url' --repo "${{ github.repository }}")
          else
            PR_URL=$(gh pr create \
              --title "$TITLE" \
              --body-file "$BODY_FILE" \
              --head "$BRANCH" \
              --base main \
              --repo "${{ github.repository }}")
            PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq '.number' --repo "${{ github.repository }}")
          fi

          echo "pull-request-number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pull-request-url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Apply label to pull request
        if: steps.create-pr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          gh pr edit ${{ steps.create-pr.outputs.pull-request-number }} \
            --add-label release-progress \
            --repo ${{ github.repository }}

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Workflow Summary
    needs: [collect-and-generate, deploy-viewer, create-data-pr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## Release Progress Tracker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Job results
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Collect & Generate | ${{ needs.collect-and-generate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Viewer | ${{ needs.deploy-viewer.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Create Data PR | ${{ needs.create-data-pr.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Data changed
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Data changed**: ${{ needs.collect-and-generate.outputs.data_changed }}" >> $GITHUB_STEP_SUMMARY

          # Viewer URL
          if [[ "${{ needs.deploy-viewer.result }}" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Viewer" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Deployed to: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
          fi
